<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MRT va UZI bo'yicha testlar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f4f4f0;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .quiz-wrap { max-width: 680px; width: 100%; }
    .header { margin-bottom: 1.5rem; }
    .header h1 { font-size: 22px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
    .header p { font-size: 14px; color: #666; }
    .progress-bar { height: 5px; background: #e0e0d8; border-radius: 3px; margin-bottom: 1.5rem; overflow: hidden; }
    .progress-fill { height: 100%; background: #1D9E75; border-radius: 3px; transition: width 0.4s ease; }
    .question-card { background: #fff; border: 1px solid #e0e0d8; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .section-badge { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #e6f1fb; color: #185fa5; margin-bottom: 8px; font-weight: 500; }
    .q-meta { font-size: 12px; color: #999; margin-bottom: 8px; }
    .q-text { font-size: 17px; font-weight: 600; color: #1a1a1a; line-height: 1.5; margin-bottom: 1.25rem; }
    .options { display: flex; flex-direction: column; gap: 8px; }
    .option-btn { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; font-size: 14px; color: #1a1a1a; text-align: left; transition: all 0.15s; width: 100%; }
    .option-btn:hover:not(:disabled) { background: #f4f4f0; border-color: #aaa; }
    .option-btn .letter { width: 26px; height: 26px; border-radius: 50%; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; color: #666; }
    .option-btn.correct { background: #eaf3de; border-color: #639922; }
    .option-btn.correct .letter { background: #639922; border-color: #639922; color: #fff; }
    .option-btn.correct .opt-text { color: #3B6D11; font-weight: 500; }
    .option-btn.wrong { background: #fcebeb; border-color: #E24B4A; }
    .option-btn.wrong .letter { background: #E24B4A; border-color: #E24B4A; color: #fff; }
    .option-btn.wrong .opt-text { color: #A32D2D; }
    .option-btn.dimmed { opacity: 0.4; }
    .option-btn:disabled { cursor: default; }
    .feedback { font-size: 13px; margin-top: 12px; padding: 10px 14px; border-radius: 8px; line-height: 1.5; }
    .feedback.ok { background: #eaf3de; color: #3B6D11; }
    .feedback.no { background: #fcebeb; color: #A32D2D; }
    .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; }
    .nav-btn { padding: 9px 22px; border: 1px solid #ccc; border-radius: 8px; background: #fff; color: #1a1a1a; font-size: 14px; cursor: pointer; transition: all 0.15s; font-weight: 500; }
    .nav-btn:hover:not(:disabled) { background: #f4f4f0; }
    .nav-btn.primary { background: #1D9E75; border-color: #1D9E75; color: #fff; }
    .nav-btn.primary:hover:not(:disabled) { background: #0F6E56; }
    .nav-btn:disabled { opacity: 0.35; cursor: default; }
    .q-counter { font-size: 13px; color: #666; }
    .results { background: #fff; border: 1px solid #e0e0d8; border-radius: 12px; padding: 2.5rem 2rem; text-align: center; }
    .score-big { font-size: 52px; font-weight: 700; color: #1a1a1a; }
    .score-label { font-size: 15px; color: #666; margin-top: 4px; }
    .score-bar { height: 8px; background: #e0e0d8; border-radius: 4px; margin: 1.5rem 0; overflow: hidden; }
    .score-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }
    .result-msg { font-size: 16px; color: #333; margin-bottom: 1.5rem; }
    .stats { display: flex; gap: 12px; justify-content: center; margin-bottom: 1.75rem; flex-wrap: wrap; }
    .stat { background: #f4f4f0; border-radius: 8px; padding: 14px 24px; min-width: 90px; }
    .stat-num { font-size: 24px; font-weight: 700; }
    .stat-lbl { font-size: 12px; color: #666; margin-top: 2px; }
    .green { color: #1D9E75; }
    .red   { color: #E24B4A; }

    @media (max-width: 480px) {
      body { padding: 1rem 0.75rem; }
      .question-card { padding: 1.25rem; }
      .q-text { font-size: 15px; }
      .results { padding: 1.75rem 1.25rem; }
    }
  </style>
</head>
<body>
<div class="quiz-wrap">
  <div class="header">
    <h1>MRT va UZI bo'yicha testlar</h1>
    <p>Har bir savolni diqqat bilan o'qing va to'g'ri javobni tanlang</p>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
  <div id="quiz-body"></div>
</div>

<script>
  // Raw questions — correct answer index refers to opts array as written here
  const rawQuestions = [
    { section: "MRT testlari", q: "MRT qaysi fizik hodisaga asoslangan?", opts: ["Rentgen nurlanishi","Yadro magnit rezonansi","Ultrasonik to'lqinlar","Elektr toki"], ans: 1 },
    { section: "MRT testlari", q: "T1 og'irlikdagi tasvirlarda qaysi tuzilma yorqin ko'rinadi?", opts: ["Suyuqlik","Yog' to'qimasi","Havo","Suyak"], ans: 1 },
    { section: "MRT testlari", q: "MRT uchun mutlaq kontraindikatsiya qaysi?", opts: ["Homiladorlik","Yurak stimulyatori (pacemaker)","Qandli diabet","Gipertoniya"], ans: 1 },
    { section: "UZI testlari", q: "UZI qanday to'lqinlarga asoslanadi?", opts: ["Rentgen","Infraqizil","Ultratovush","Radioto'lqin"], ans: 2 },
    { section: "UZI testlari", q: "Doppler UZI nimani baholaydi?", opts: ["Suyak zichligini","Qon oqimini","Mushak kuchini","Nerv impulsini"], ans: 1 },
    { section: "UZI testlari", q: "Anexogen tuzilma qanday ko'rinadi?", opts: ["Oq","Qora","Kulrang","Yashil"], ans: 1 },
    { section: "UZI testlari", q: "UZI ning asosiy afzalligi nima?", opts: ["Ionlovchi nurlanish mavjud","Arzon va xavfsiz","Faqat suyakni ko'rsatadi","Har doim kontrast talab qiladi"], ans: 1 },
    { section: "UZI testlari", q: "Akustik soya qachon hosil bo'ladi?", opts: ["Suyuqlik ortida","Suyak yoki tosh ortida","Havo ichida","Mushak ichida"], ans: 1 },
    { section: "MRT vs UZI", q: "Qaysi usul yumshoq to'qimalarni yaxshiroq ko'rsatadi?", opts: ["UZI","MRT","Rentgen","Fluorografiya"], ans: 1 },
    { section: "MRT vs UZI", q: "Homiladorlikda eng xavfsiz usul qaysi?", opts: ["KT","MRT (har doim)","UZI","Rentgen"], ans: 2 },
    { section: "MRT vs UZI", q: "Favqulodda holatda tezkor tekshiruv uchun qaysi usul qulay?", opts: ["MRT","UZI","PET","Angiografiya"], ans: 1 },
    { section: "MRT vs UZI", q: "MRT ning asosiy kamchiligi nima?", opts: ["Past aniqlik","Yuqori narx va uzoq davom etishi","Xavfli nurlanish","Faqat suyakni ko'rsatadi"], ans: 1 },
    { section: "MRT vs UZI", q: "Qorin bo'shlig'i dastlabki tekshiruvida qaysi usul tanlanadi?", opts: ["MRT","KT","UZI","Rentgen"], ans: 2 },
  ];

  // Fisher-Yates shuffle
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // Shuffle option positions for each question, keep track of new correct index
  function buildQuestions() {
    return rawQuestions.map(q => {
      const correctText = q.opts[q.ans];
      const shuffledOpts = shuffle(q.opts);
      const newAns = shuffledOpts.indexOf(correctText);
      return { section: q.section, q: q.q, opts: shuffledOpts, ans: newAns };
    });
  }

  const letters = ["A","B","C","D"];
  let questions = buildQuestions();
  let current  = 0;
  let answered = new Array(questions.length).fill(null);
  let selected  = new Array(questions.length).fill(null);

  function render() {
    const body = document.getElementById('quiz-body');
    const prog = document.getElementById('prog');

    if (current === questions.length) {
      const correct = answered.filter((a, i) => a === questions[i].ans).length;
      const pct = Math.round((correct / questions.length) * 100);
      const msg = pct === 100 ? "Mukammal natija! Barcha savollar to'g'ri!" :
                  pct >= 70  ? "Yaxshi natija! Ko'proq mashq qiling." :
                               "Ko'proq o'qish kerak. Harakat qiling!";
      const color = pct >= 70 ? "#1D9E75" : pct >= 40 ? "#EF9F27" : "#E24B4A";
      prog.style.width = "100%";
      body.innerHTML = `
        <div class="results">
          <div class="score-big">${pct}%</div>
          <div class="score-label">Umumiy natija</div>
          <div class="score-bar"><div class="score-fill" id="sfill" style="width:0%;background:${color}"></div></div>
          <div class="result-msg">${msg}</div>
          <div class="stats">
            <div class="stat"><div class="stat-num green">${correct}</div><div class="stat-lbl">To'g'ri</div></div>
            <div class="stat"><div class="stat-num red">${questions.length - correct}</div><div class="stat-lbl">Noto'g'ri</div></div>
            <div class="stat"><div class="stat-num">${questions.length}</div><div class="stat-lbl">Jami</div></div>
          </div>
          <button class="nav-btn primary" onclick="restart()">Qaytadan boshlash</button>
        </div>`;
      setTimeout(() => { document.getElementById('sfill').style.width = pct + '%'; }, 100);
      return;
    }

    const q = questions[current];
    const done = answered[current] !== null;
    const sel  = selected[current];
    prog.style.width = Math.round((current / questions.length) * 100) + '%';

    const optHtml = q.opts.map((opt, i) => {
      let cls = '';
      if (done) {
        if (i === q.ans) cls = 'correct';
        else if (i === sel && sel !== q.ans) cls = 'wrong';
        else cls = 'dimmed';
      }
      return `<button class="option-btn ${cls}" ${done ? 'disabled' : ''} onclick="choose(${i})">
        <span class="letter">${letters[i]}</span>
        <span class="opt-text">${opt}</span>
      </button>`;
    }).join('');

    let feedbackHtml = '';
    if (done) {
      feedbackHtml = sel === q.ans
        ? `<div class="feedback ok">To'g'ri javob!</div>`
        : `<div class="feedback no">Noto'g'ri. To'g'ri javob: <strong>${letters[q.ans]}) ${q.opts[q.ans]}</strong></div>`;
    }

    const isLast = current === questions.length - 1;
    body.innerHTML = `
      <div class="question-card">
        <span class="section-badge">${q.section}</span>
        <div class="q-meta">Savol ${current + 1} / ${questions.length}</div>
        <div class="q-text">${q.q}</div>
        <div class="options">${optHtml}</div>
        ${feedbackHtml}
      </div>
      <div class="nav">
        <button class="nav-btn" onclick="go(-1)" ${current === 0 ? 'disabled' : ''}>← Oldingi</button>
        <span class="q-counter">${current + 1} / ${questions.length}</span>
        <button class="nav-btn primary" onclick="go(1)" ${!done ? 'disabled' : ''}>
          ${isLast ? 'Natijalar →' : 'Keyingi →'}
        </button>
      </div>`;
  }

  function choose(i) {
    if (answered[current] !== null) return;
    selected[current] = i;
    answered[current] = i;
    render();
  }

  function go(dir) {
    current = Math.max(0, current + dir);
    render();
  }

  function restart() {
    questions = buildQuestions(); // re-shuffle on every restart
    current  = 0;
    answered = new Array(questions.length).fill(null);
    selected  = new Array(questions.length).fill(null);
    render();
  }

  render();
</script>
</body>
</html>
